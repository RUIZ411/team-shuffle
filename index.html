<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  set,
  update,
  get
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUnRYwTkfmN_ETHqumWdernmecnV2IUjk",
  authDomain: "team-shuffle-9017c.firebaseapp.com",
  databaseURL: "https://team-shuffle-9017c-default-rtdb.firebaseio.com",
  projectId: "team-shuffle-9017c",
  storageBucket: "team-shuffle-9017c.firebasestorage.app",
  messagingSenderId: "629689458782",
  appId: "1:629689458782:web:8b9644a6d3089dd74794cf",
  measurementId: "G-NXYZY0NMMH"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function bindInput(room) {
  const inputs = document.querySelectorAll(`#${room} .inputs input`);
  const roomRef = ref(db, room + "/players");

  inputs.forEach((input, idx) => {
    input.addEventListener("input", async () => {
      const values = Array.from(inputs).map(i => i.value.trim());
      await set(roomRef, values);
    });
  });

  onValue(roomRef, snapshot => {
    const data = snapshot.val() || [];
    inputs.forEach((input, idx) => {
      if (input !== document.activeElement) {
        input.value = data[idx] || "";
      }
    });
  });
}

function bindShuffle(room) {
  const root = document.getElementById(room);
  const btn = root.querySelector(".shuffle-btn");
  const team1El = root.querySelector(".team1");
  const team2El = root.querySelector(".team2");

  btn.addEventListener("click", async () => {
    const players = Array.from(root.querySelectorAll(".inputs input"))
      .map(i => i.value.trim());

    if (players.some(v => !v)) {
      alert("10명 모두 입력");
      return;
    }

    const team1 = [];
    const team2 = [];

    for (let i = 0; i < players.length; i += 2) {
      if (Math.random() < 0.5) {
        team1.push(players[i]);
        team2.push(players[i + 1]);
      } else {
        team1.push(players[i + 1]);
        team2.push(players[i]);
      }
    }

    await set(ref(db, room + "/teams"), { team1, team2 });
  });

  onValue(ref(db, room + "/teams"), snapshot => {
    const data = snapshot.val();
    if (!data) return;

    team1El.innerHTML = "";
    team2El.innerHTML = "";

    data.team1.forEach(name => {
      const li = document.createElement("li");
      li.textContent = name;
      team1El.appendChild(li);
    });

    data.team2.forEach(name => {
      const li = document.createElement("li");
      li.textContent = name;
      team2El.appendChild(li);
    });
  });
}

bindInput("shuffle1");
bindInput("shuffle2");
bindShuffle("shuffle1");
bindShuffle("shuffle2");
</script>
