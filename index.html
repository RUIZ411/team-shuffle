<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKG 증바람랜드 팀 셔플</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  color: #111827;
  padding: 20px;
  transition: 0.3s;
}

body.dark {
  background: #111827;
  color: white;
}

.topbar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 20px;
}

.mode-btn {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.box {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

body.dark .box {
  background: #1f2937;
}

h1 {
  text-align: center;
  font-size: 24px;
}

.inputs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.shuffle {
  background: #3b82f6;
  color: white;
}

.reset {
  background: #e5e7eb;
}

.teams {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 20px;
}

.team {
  background: #f9fafb;
  border-radius: 10px;
  padding: 10px;
}

body.dark .team {
  background: #374151;
}

ul {
  padding-left: 20px;
}

@media(max-width:900px){
  .wrap{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <button class="mode-btn" onclick="toggleMode()">다크모드</button>
</div>

<div class="wrap">

  <div class="box" id="shuffle1">
    <h1>BKG 증바람랜드 A</h1>
    <div class="inputs"></div>
    <div class="buttons">
      <button class="shuffle">팀 섞기</button>
      <button class="reset">초기화</button>
    </div>
    <div class="teams">
      <div class="team">
        <h3>블루</h3>
        <ul class="team1"></ul>
      </div>
      <div class="team">
        <h3>레드</h3>
        <ul class="team2"></ul>
      </div>
    </div>
  </div>

  <div class="box" id="shuffle2">
    <h1>BKG 증바람랜드 B</h1>
    <div class="inputs"></div>
    <div class="buttons">
      <button class="shuffle">팀 섞기</button>
      <button class="reset">초기화</button>
    </div>
    <div class="teams">
      <div class="team">
        <h3>블루</h3>
        <ul class="team1"></ul>
      </div>
      <div class="team">
        <h3>레드</h3>
        <ul class="team2"></ul>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUnRYwTkfmN_ETHqumWdernmecnV2IUjk",
  authDomain: "team-shuffle-9017c.firebaseapp.com",
  databaseURL: "https://team-shuffle-9017c-default-rtdb.firebaseio.com",
  projectId: "team-shuffle-9017c",
  storageBucket: "team-shuffle-9017c.firebasestorage.app",
  messagingSenderId: "629689458782",
  appId: "1:629689458782:web:8b9644a6d3089dd74794cf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function createApp(id) {
  const root = document.getElementById(id);
  const inputs = root.querySelector(".inputs");
  const team1 = root.querySelector(".team1");
  const team2 = root.querySelector(".team2");

  for(let i=0;i<10;i++){
    const input = document.createElement("input");
    input.placeholder = `플레이어 ${i+1}`;
    input.addEventListener("input", save);
    inputs.appendChild(input);
  }

  async function save(){
    const values = [...inputs.querySelectorAll("input")].map(v=>v.value);
    await set(ref(db,id+"/players"), values);
  }

  onValue(ref(db,id+"/players"), snap=>{
    const data = snap.val() || [];
    [...inputs.querySelectorAll("input")].forEach((input,i)=>{
      if(document.activeElement!==input){
        input.value = data[i] || "";
      }
    });
  });

  root.querySelector(".shuffle").addEventListener("click", async ()=>{
    const players = [...inputs.querySelectorAll("input")].map(v=>v.value);

    if(players.some(v=>!v)) return alert("10명 입력");

    let a=[], b=[];

    for(let i=0;i<10;i+=2){
      if(Math.random()<0.5){
        a.push(players[i]);
        b.push(players[i+1]);
      }else{
        a.push(players[i+1]);
        b.push(players[i]);
      }
    }

    await set(ref(db,id+"/teams"), {a,b});
  });

  onValue(ref(db,id+"/teams"), snap=>{
    const data = snap.val();
    if(!data) return;

    team1.innerHTML="";
    team2.innerHTML="";

    data.a.forEach(v=>{
      const li=document.createElement("li");
      li.textContent=v;
      team1.appendChild(li);
    });

    data.b.forEach(v=>{
      const li=document.createElement("li");
      li.textContent=v;
      team2.appendChild(li);
    });
  });

  root.querySelector(".reset").addEventListener("click", async ()=>{
    await set(ref(db,id), null);
  });
}

createApp("shuffle1");
createApp("shuffle2");

window.toggleMode = function(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
