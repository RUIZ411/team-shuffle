<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKG 증바람랜드 팀 셔플</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  color: #111827;
  padding: 20px;
  transition: 0.3s;
}

body.dark {
  background: #111827;
  color: white;
}

.topbar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 20px;
}

.mode-btn {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.box {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

body.dark .box {
  background: #1f2937;
}

h1 {
  text-align: center;
  font-size: 24px;
}

.inputs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.shuffle {
  background: #3b82f6;
  color: white;
}

.copy {
  background: #10b981;
  color: white;
}

.reset {
  background: #e5e7eb;
}

.teams {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 20px;
}

.team {
  background: #f9fafb;
  border-radius: 10px;
  padding: 10px;
}

body.dark .team {
  background: #374151;
}

ul {
  padding-left: 20px;
}

.message {
  margin-top: 12px;
  font-size: 14px;
  opacity: 0.95;
  line-height: 1.5;
}

@media (max-width: 900px) {
  .wrap {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <button class="mode-btn" onclick="toggleMode()">다크모드</button>
</div>

<div class="wrap">

  <div class="box" id="shuffle1">
    <h1>BKG 증바람랜드 A</h1>
    <div class="inputs"></div>
    <div class="buttons">
      <button class="shuffle">팀 섞기</button>
      <button class="copy">복사</button>
      <button class="reset">초기화</button>
    </div>
    <div class="teams">
      <div class="team">
        <h3>블루</h3>
        <ul class="team1"></ul>
      </div>
      <div class="team">
        <h3>레드</h3>
        <ul class="team2"></ul>
      </div>
    </div>
    <div class="message"></div>
  </div>

  <div class="box" id="shuffle2">
    <h1>BKG 증바람랜드 B</h1>
    <div class="inputs"></div>
    <div class="buttons">
      <button class="shuffle">팀 섞기</button>
      <button class="copy">복사</button>
      <button class="reset">초기화</button>
    </div>
    <div class="teams">
      <div class="team">
        <h3>블루</h3>
        <ul class="team1"></ul>
      </div>
      <div class="team">
        <h3>레드</h3>
        <ul class="team2"></ul>
      </div>
    </div>
    <div class="message"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  get,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUnRYwTkfmN_ETHqumWdernmecnV2IUjk",
  authDomain: "team-shuffle-9017c.firebaseapp.com",
  databaseURL: "https://team-shuffle-9017c-default-rtdb.firebaseio.com",
  projectId: "team-shuffle-9017c",
  storageBucket: "team-shuffle-9017c.firebasestorage.app",
  messagingSenderId: "629689458782",
  appId: "1:629689458782:web:8b9644a6d3089dd74794cf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const PLAYER_COUNT = 10;

function normalizeTeam(team) {
  return [...team].sort().join("|");
}

function isSameAsPrevious(current, previous) {
  if (!previous || !previous.team1 || !previous.team2) return false;

  const currentA = normalizeTeam(current.team1);
  const currentB = normalizeTeam(current.team2);
  const prevA = normalizeTeam(previous.team1);
  const prevB = normalizeTeam(previous.team2);

  return (
    (currentA === prevA && currentB === prevB) ||
    (currentA === prevB && currentB === prevA)
  );
}

function countChangedLines(current, previous) {
  if (!previous || !previous.team1 || !previous.team2) return 5;

  let changed = 0;

  for (let i = 0; i < 5; i++) {
    const currentBlue = current.team1[i] || "";
    const currentRed = current.team2[i] || "";
    const prevBlue = previous.team1[i] || "";
    const prevRed = previous.team2[i] || "";

    if (currentBlue !== prevBlue || currentRed !== prevRed) {
      changed++;
    }
  }

  return changed;
}

function makeTeams(players) {
  const team1 = [];
  const team2 = [];

  for (let i = 0; i < players.length; i += 2) {
    const a = players[i];
    const b = players[i + 1];

    if (Math.random() < 0.5) {
      team1.push(a);
      team2.push(b);
    } else {
      team1.push(b);
      team2.push(a);
    }
  }

  return { team1, team2 };
}

function createApp(id) {
  const root = document.getElementById(id);
  const inputsWrap = root.querySelector(".inputs");
  const team1El = root.querySelector(".team1");
  const team2El = root.querySelector(".team2");
  const messageEl = root.querySelector(".message");

  for (let i = 0; i < PLAYER_COUNT; i++) {
    const input = document.createElement("input");
    input.placeholder = `플레이어 ${i + 1}`;
    input.addEventListener("input", savePlayers);
    inputsWrap.appendChild(input);
  }

  async function savePlayers() {
    const players = [...inputsWrap.querySelectorAll("input")].map(input => input.value.trim());
    const snapshot = await get(ref(db, id));
    const prevData = snapshot.exists() ? snapshot.val() : {};

    await set(ref(db, id), {
      players,
      lastTeams: prevData.lastTeams || null,
      message: prevData.message || ""
    });
  }

  function renderTeams(data) {
    team1El.innerHTML = "";
    team2El.innerHTML = "";

    const teams = data?.lastTeams;
    if (!teams || !teams.team1 || !teams.team2) return;

    teams.team1.forEach(name => {
      const li = document.createElement("li");
      li.textContent = name;
      team1El.appendChild(li);
    });

    teams.team2.forEach(name => {
      const li = document.createElement("li");
      li.textContent = name;
      team2El.appendChild(li);
    });
  }

  onValue(ref(db, id), snapshot => {
    const data = snapshot.val() || {};
    const players = Array.isArray(data.players) ? data.players : [];

    [...inputsWrap.querySelectorAll("input")].forEach((input, i) => {
      if (document.activeElement !== input) {
        input.value = players[i] || "";
      }
    });

    renderTeams(data);
    messageEl.textContent = data.message || "";
  });

  root.querySelector(".shuffle").addEventListener("click", async () => {
    const players = [...inputsWrap.querySelectorAll("input")].map(input => input.value.trim());

    if (players.length !== PLAYER_COUNT || players.some(v => !v)) {
      alert("10명을 모두 입력해주세요.");
      return;
    }

    const snapshot = await get(ref(db, id));
    const data = snapshot.exists() ? snapshot.val() : {};
    const previousResult = data.lastTeams || null;

    let result = null;
    let attempts = 0;

    do {
      result = makeTeams(players);
      attempts++;
    } while (
      previousResult &&
      (isSameAsPrevious(result, previousResult) || countChangedLines(result, previousResult) < 2) &&
      attempts < 100
    );

    if (
      previousResult &&
      (isSameAsPrevious(result, previousResult) || countChangedLines(result, previousResult) < 2)
    ) {
      alert("조건을 만족하는 새 팀 결과를 만들지 못했습니다. 입력 조합을 확인해주세요.");
      return;
    }

    const changedLines = previousResult ? countChangedLines(result, previousResult) : 5;

    await set(ref(db, id), {
      players,
      lastTeams: result,
      message: previousResult
        ? `직전 결과와 ${changedLines}라인 다르게 섞었습니다.`
        : "첫 팀 결과가 생성되었습니다."
    });
  });

  root.querySelector(".copy").addEventListener("click", async () => {
    const blue = [...team1El.querySelectorAll("li")].map(li => li.textContent.trim());
    const red = [...team2El.querySelectorAll("li")].map(li => li.textContent.trim());

    if (blue.length !== 5 || red.length !== 5) {
      alert("먼저 팀을 섞어주세요.");
      return;
    }

    let text = "블루\t레드\n";
    for (let i = 0; i < 5; i++) {
      text += `${blue[i]}\t${red[i]}\n`;
    }

    try {
      await navigator.clipboard.writeText(text);
      messageEl.textContent = "팀 결과가 복사되었습니다.";
    } catch (error) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();

      try {
        document.execCommand("copy");
        messageEl.textContent = "팀 결과가 복사되었습니다.";
      } catch (e) {
        alert("복사에 실패했습니다.");
      }

      document.body.removeChild(textarea);
    }
  });

  root.querySelector(".reset").addEventListener("click", async () => {
    if (!confirm("멤버와 직전 팀 결과를 초기화할까요?")) return;

    await set(ref(db, id), {
      players: Array(PLAYER_COUNT).fill(""),
      lastTeams: null,
      message: "초기화되었습니다."
    });
  });
}

createApp("shuffle1");
createApp("shuffle2");

window.toggleMode = function () {
  document.body.classList.toggle("dark");
};
</script>

</body>
</html>
