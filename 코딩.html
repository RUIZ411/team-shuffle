<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>5대5 팀 섞기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 420px;
    }

    h1 {
      text-align: center;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    input {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(90deg,#3b82f6,#9333ea);
      color: white;
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .team {
      background: #f9fafb;
      padding: 12px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>5 vs 5 팀 섞기</h1>

  <div class="grid" id="inputs"></div>

  <button onclick="shuffleTeams()">팀 섞기</button>

  <div class="teams">
    <div class="team">
      <strong>팀 1</strong>
      <ul id="team1"></ul>
    </div>
    <div class="team">
      <strong>팀 2</strong>
      <ul id="team2"></ul>
    </div>
  </div>
</div>

<script>

// 입력칸 생성 + 저장 불러오기
const saved = JSON.parse(localStorage.getItem("players") || "[]");
const inputsDiv = document.getElementById("inputs");

for (let i = 0; i < 10; i++) {
  const input = document.createElement("input");
  input.placeholder = `플레이어 ${i+1}`;
  input.value = saved[i] || "";

  input.addEventListener("input", () => {
    const values = Array.from(document.querySelectorAll("input")).map(i => i.value);
    localStorage.setItem("players", JSON.stringify(values));
  });

  inputsDiv.appendChild(input);
}

function shuffleTeams() {
  let players = Array.from(document.querySelectorAll("input")).map(i => i.value.trim());

  // 10명 확인
  if (players.length !== 10 || players.some(p => p === "")) {
    alert("10명을 모두 입력해야 합니다.");
    return;
  }

  // 티어별 그룹화 (뒤 숫자 기준)
  const tiers = {};

  for (let p of players) {
    const match = p.match(/(\d+)$/);

    if (!match) {
      alert("이름 뒤에 티어 숫자를 입력해야 합니다. 예: A1, B1");
      return;
    }

    const tier = match[1];

    if (!tiers[tier]) tiers[tier] = [];
    tiers[tier].push(p);
  }

  let t1 = [];
  let t2 = [];

  // 각 티어는 반드시 2명씩
  Object.keys(tiers)
    .sort((a, b) => Number(a) - Number(b))
    .forEach(tier => {
      const group = tiers[tier];

      if (group.length !== 2) {
        alert(`${tier} 티어 인원이 2명이 아닙니다.`);
        return;
      }

      // 랜덤으로 한 명씩 분배
      if (Math.random() < 0.5) {
        t1.push(group[0]);
        t2.push(group[1]);
      } else {
        t1.push(group[1]);
        t2.push(group[0]);
      }
    });

  displayTeam("team1", t1);
  displayTeam("team2", t2);
}

  // 티어별 그룹화 (뒤 숫자 기준)
  const tiers = {};

  players.forEach(p => {
    const match = p.match(/(\d+)$/);
    const tier = match ? match[1] : "0";

    if (!tiers[tier]) tiers[tier] = [];
    tiers[tier].push(p);
  });

  let t1 = [];
  let t2 = [];

  Object.values(tiers).forEach(group => {
    const shuffled = group.sort(() => Math.random() - 0.5);

    t1.push(shuffled[0]);
    t2.push(shuffled[1]);
  });

  displayTeam("team1", t1);
  displayTeam("team2", t2);
}

function displayTeam(id, team) {
  const ul = document.getElementById(id);
  ul.innerHTML = "";

  team.forEach(p => {
    const li = document.createElement("li");
    li.textContent = p;
    ul.appendChild(li);
  });
}

</script>

</body>
</html>
